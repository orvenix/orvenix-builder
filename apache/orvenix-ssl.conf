<VirtualHost *:443>
    ServerName orvenix.com.mx
    ServerAlias www.orvenix.com.mx

    SSLEngine on
    SSLCertificateFile /etc/ssl/orvenix/cert.pem
    SSLCertificateKeyFile /etc/ssl/orvenix/key.pem

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
</VirtualHost>
