# ============================================================================
# Nginx — Orvenix producción
# Coloca este archivo en: /etc/nginx/sites-available/orvenix
# Luego: sudo ln -s /etc/nginx/sites-available/orvenix /etc/nginx/sites-enabled/
# SSL gestionado con: sudo certbot --nginx -d orvenix.com.mx -d www.orvenix.com.mx
# ============================================================================

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name orvenix.com.mx www.orvenix.com.mx;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name orvenix.com.mx www.orvenix.com.mx;

    # SSL — Let's Encrypt (Certbot los rellena automáticamente)
    ssl_certificate     /etc/letsencrypt/live/orvenix.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orvenix.com.mx/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirigir www → sin www
    if ($host = www.orvenix.com.mx) {
        return 301 https://orvenix.com.mx$request_uri;
    }

    # Logs
    access_log /var/log/nginx/orvenix.access.log;
    error_log  /var/log/nginx/orvenix.error.log;

    # Tamaño máximo de subida (ajustar si hay uploads de assets)
    client_max_body_size 20M;

    # Timeouts para SSR largo
    proxy_read_timeout    120s;
    proxy_connect_timeout 120s;
    proxy_send_timeout    120s;

    # Proxy hacia Next.js (PM2 en puerto 3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Caché de assets estáticos de Next.js
        location ~* ^/_next/static/ {
            proxy_pass http://127.0.0.1:3000;
            proxy_cache_bypass $http_upgrade;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Caché de imágenes optimizadas
        location ~* ^/_next/image {
            proxy_pass http://127.0.0.1:3000;
            add_header Cache-Control "public, max-age=86400";
        }
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    location ~* \.(json)$ {
        location ~ /(data|sistema)/ {
            deny all;
            return 404;
        }
    }
}
